<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLOT-DB - 公開済みレポート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .query-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; transition: all 0.3s; }
        .query-card:hover { transform: translateY(-2px); border-color: rgba(56, 189, 248, 0.5); background: rgba(30, 41, 59, 0.8); }
        html.mobile-mode body { padding: 1rem; }
        html.mobile-mode .query-card { padding: 0.75rem; border-radius: 0.75rem; }
        html.desktop-mode body { padding: 2rem; }
        html.desktop-mode .max-w-4xl { max-width: 56rem; margin: 0 auto; }
    </style>
    <script>
        function toggleViewMode() {
            const isMobile = document.documentElement.classList.toggle('mobile-mode');
            document.documentElement.classList.toggle('desktop-mode', !isMobile);
            localStorage.setItem('slotdb_view_mode', isMobile ? 'mobile' : 'desktop');
            document.getElementById('view-toggle-btn').innerText = isMobile ? '💻 PC' : '📱 スマホ';
        }
        window.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('slotdb_view_mode');
            const isMobile = savedMode ? savedMode === 'mobile' : window.innerWidth <= 768;
            document.documentElement.classList.toggle('mobile-mode', isMobile);
            document.documentElement.classList.toggle('desktop-mode', !isMobile);
            document.getElementById('view-toggle-btn').innerText = isMobile ? '💻 PC' : '📱 スマホ';
        });
    </script>
</head>
<body class="transition-all duration-300 relative">
    <div class="max-w-4xl mx-auto relative">
        <header class="flex justify-between items-center mb-8 pt-2">

            <button id="view-toggle-btn" onclick="toggleViewMode()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded shadow-lg transition-all z-50">📱 スマホ</button>
        </header>
        <div class="space-y-3 sm:space-y-4">
            
        <div class="query-card glass relative overflow-hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-4">

                    <div class="text-sky-300 font-bold text-sm mb-1">9の日機種平均</div>
                    <div class="text-xs text-slate-300 line-clamp-2 mb-2 leading-relaxed" title="店舗: ジャラン浅草店 | 日付: 全期間 | 機種: 全機種">店舗: ジャラン浅草店 | 日付: 全期間 | 機種: 全機種</div>
                </div>
                <div class="text-left sm:text-right shrink-0 w-full sm:w-auto flex flex-row sm:flex-col justify-between sm:justify-end items-center sm:items-end">
                    <div class="text-[10px] text-slate-500 mb-2 sm:mb-0">2026-04-28 19:04:38</div>
                    <div>
                        <button onclick="window.open('https://Alice-river.github.io/slot-db-results/output/1777370589562.html', '_blank')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] px-4 py-2 sm:px-3 sm:py-1 rounded-full font-bold transition-all w-full sm:w-auto text-center">結果を表示</button>

            </div>
        </div>
        
        <div class="query-card glass relative overflow-hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-4">
                <div class="flex-1 min-w-0">
                    <div class="text-emerald-400 font-bold text-lg mb-1 truncate">ヒロキMAX蒲田店</div>

                    </div>

            </div>
        </div>

    </div>
</body>
</html>
